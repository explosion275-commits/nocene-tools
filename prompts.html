<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt Generator | Noc&#232;ne</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display:wght@400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            background-color: #09090e;
            color: #ededf0;
            font-family: 'DM Sans', sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navigation */
        nav {
            background-color: #0f0f14;
            border-bottom: 1px solid #1a1a22;
            padding: 1.25rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            font-family: 'DM Serif Display', serif;
            font-size: 1.5rem;
            font-weight: 400;
            text-decoration: none;
            color: #ededf0;
            transition: color 0.3s ease;
        }

        .nav-logo:hover {
            color: #e8c87a;
        }

        .credit-badge-count {
            background-color: #1a1a22;
            border: 1px solid #2a2a32;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.875rem;
            color: #ededf0;
        }

        /* Main Container */
        main {
            flex: 1;
            max-width: 1000px;
            margin: 0 auto;
            padding: 3rem 2rem;
            width: 100%;
        }

        h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 2.5rem;
            font-weight: 400;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #a8a8b0;
            margin-bottom: 3rem;
            font-size: 1rem;
        }

        /* Input Section */
        .input-section {
            background-color: #0f0f14;
            border: 1px solid #1a1a22;
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #ededf0;
        }

        textarea {
            width: 100%;
            padding: 1rem;
            background-color: #14141b;
            border: 1px solid #1a1a22;
            border-radius: 8px;
            color: #ededf0;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            min-height: 120px;
            resize: vertical;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: #2a2a32;
            background-color: #1a1a22;
        }

        select {
            width: 100%;
            padding: 0.75rem 1rem;
            background-color: #14141b;
            border: 1px solid #1a1a22;
            border-radius: 8px;
            color: #ededf0;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        select:focus {
            outline: none;
            border-color: #2a2a32;
            background-color: #1a1a22;
        }

        /* Button */
        .button-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin: 2rem 0;
        }

        button {
            background-color: #e8c87a;
            color: #09090e;
            border: none;
            padding: 1rem 2rem;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'DM Sans', sans-serif;
        }

        button:hover:not(:disabled) {
            background-color: #f5d798;
            transform: translateY(-2px);
        }

        button:disabled {
            background-color: #5a5a62;
            color: #a8a8b0;
            cursor: not-allowed;
        }

        /* Loading State */
        .loading {
            display: none;
            text-align: center;
            padding: 2rem;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 3px solid #1a1a22;
            border-top: 3px solid #e8c87a;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Output Section */
        .output-section {
            display: none;
        }

        .output-section.active {
            display: block;
        }

        .prompt-card {
            background-color: #0f0f14;
            border: 1px solid #1a1a22;
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 1.5rem;
        }

        .prompt-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #e8c87a;
            margin-bottom: 1rem;
        }

        .prompt-content {
            color: #a8a8b0;
            line-height: 1.8;
            white-space: pre-wrap;
            word-wrap: break-word;
            margin-bottom: 1rem;
        }

        .copy-btn {
            background-color: rgba(232, 200, 122, 0.2);
            color: #e8c87a;
            border: 1px solid #e8c87a;
            padding: 0.75rem 1.5rem;
            font-size: 0.9rem;
        }

        .copy-btn:hover {
            background-color: rgba(232, 200, 122, 0.3);
        }

        .copy-btn.copied {
            background-color: rgba(100, 200, 100, 0.2);
            color: #64c864;
            border-color: #64c864;
        }

        /* Footer */
        footer {
            border-top: 1px solid #1a1a22;
            padding: 2rem;
            text-align: center;
            color: #5a5a62;
            font-size: 0.875rem;
        }

        @media (max-width: 768px) {
            main {
                padding: 1.5rem 1rem;
            }

            h1 {
                font-size: 1.75rem;
            }

            .input-section {
                padding: 1.5rem;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="nav-logo">Noc&#232;ne</a>
        <div class="credit-badge-count">0 Credits</div>
    </nav>

    <main>
        <h1>AI Prompt Generator</h1>
        <p class="subtitle">Generate powerful prompts for any task using AI</p>

        <div class="input-section">
            <div class="form-group">
                <label for="task">What task do you want to create a prompt for?</label>
                <textarea id="task" placeholder="e.g., Write a professional email, Create a marketing campaign, Debug code..." required></textarea>
            </div>

            <div class="form-group">
                <label for="style">Prompt Style</label>
                <select id="style" required>
                    <option value="">Select a style</option>
                    <option value="professional">Professional</option>
                    <option value="creative">Creative</option>
                    <option value="technical">Technical</option>
                    <option value="conversational">Conversational</option>
                    <option value="academic">Academic</option>
                </select>
            </div>

            <div class="form-group">
                <label for="context">Additional Context (Optional)</label>
                <textarea id="context" placeholder="Any additional details or constraints..."></textarea>
            </div>

            <div class="button-group">
                <button onclick="generatePrompt()">Generate Prompt (1 Credit)</button>
            </div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Generating your prompt...</p>
        </div>

        <div class="output-section" id="outputSection">
            <div class="prompt-card">
                <div class="prompt-title">Your Generated Prompt</div>
                <div class="prompt-content" id="promptOutput"></div>
                <button class="copy-btn" onclick="copyPrompt()">Copy to Clipboard</button>
            </div>
        </div>
    </main>

    <footer>
        &copy; 2026 Noc&#232;ne. All rights reserved.
    </footer>

    <script src="credits.js"></script>
    <script src="https://app.lemonsqueezy.com/js/lemon.js" defer></script>

    <script>
        async function generatePrompt() {
            const task = document.getElementById('task').value;
            const style = document.getElementById('style').value;
            const context = document.getElementById('context').value;

            if (!task || !style) {
                alert('Please fill in the task and select a style');
                return;
            }

            // Check credits
            if (typeof Nocene !== 'undefined' && Nocene.requireCredit) {
                if (!Nocene.requireCredit()) {
                    alert('You don\'t have enough credits.');
                    return;
                }
            }

            const loading = document.getElementById('loading');
            const outputSection = document.getElementById('outputSection');
            loading.classList.add('active');
            outputSection.classList.remove('active');

            try {
                const systemPrompt = `You are an expert at creating powerful, effective prompts for AI models. Generate a detailed, well-structured prompt that will help users get the best results from AI.`;

                const userMessage = `Create a detailed prompt for the following:
Task: ${task}
Style: ${style}
Context: ${context || 'None provided'}

The prompt should be clear, specific, and optimized for getting the best results from an AI model.`;

                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'content-type': 'application/json' },
                    body: JSON.stringify({
                        model: 'claude-sonnet-4-20250514',
                        max_tokens: 1000,
                        system: systemPrompt,
                        messages: [{ role: 'user', content: userMessage }]
                    })
                });

                if (!response.ok) throw new Error('API error');
                const data = await response.json();
                const content = data.content || data.text || '';

                document.getElementById('promptOutput').textContent = content;
                loading.classList.remove('active');
                outputSection.classList.add('active');
            } catch (error) {
                loading.classList.remove('active');
                alert('Error generating prompt: ' + error.message);
            }
        }

        function copyPrompt() {
            const promptContent = document.getElementById('promptOutput').textContent;
            navigator.clipboard.writeText(promptContent).then(() => {
                const btn = event.target;
                const originalText = btn.textContent;
                btn.textContent = '✓ Copied!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        function updateCreditBadge() {
            const badge = document.querySelector('.credit-badge-count');
            if (typeof Nocene !== 'undefined' && Nocene.getCredits) {
                const credits = Nocene.getCredits();
                badge.textContent = credits + ' Credits';
            }
        }

        function initializeInterface() {
            updateCreditBadge();
            if (typeof Nocene !== 'undefined' && Nocene.onCreditChange) {
                Nocene.onCreditChange(() => {
                    updateCreditBadge();
                });
            }
        }

        document.addEventListener('DOMContentLoaded', initializeInterface);
    </script>
</body>
</html>
