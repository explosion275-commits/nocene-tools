    <script>
        let currentStep = 1;
        const totalSteps = 4;
        let formData = {};
        let experienceCount = 1;

        function goToStep(step) {
            if (step < 1 || step > totalSteps) return;

            // Hide all steps
            document.querySelectorAll('.form-step').forEach(el => {
                el.classList.remove('active');
            });

            // Show current step
            document.querySelector(`.form-step[data-step="${step}"]`).classList.add('active');

            // Update step indicator
            document.querySelectorAll('.step-item').forEach((item, index) => {
                item.classList.remove('active', 'completed');
                const stepNum = parseInt(item.dataset.step);
                if (stepNum === step) {
                    item.classList.add('active');
                } else if (stepNum < step) {
                    item.classList.add('completed');
                }
            });

            // Update button states
            document.getElementById('back-btn').disabled = step === 1;
            const nextBtn = document.getElementById('next-btn');
            if (step === totalSteps) {
                nextBtn.textContent = 'Generate Resume (1 credit)';
                nextBtn.onclick = () => Nocene.requireCredit(() => generateResume());
            } else {
                nextBtn.textContent = 'Next';
                nextBtn.onclick = nextStep;
            }

            currentStep = step;
            window.scrollTo(0, 0);
        }

        function nextStep() {
            if (currentStep < totalSteps) {
                goToStep(currentStep + 1);
            }
        }

        function previousStep() {
            if (currentStep > 1) {
                goToStep(currentStep - 1);
            }
        }

        function addExperienceEntry() {
            if (experienceCount >= 5) {
                showToast('Maximum 5 experience entries allowed');
                return;
            }

            experienceCount++;
            const container = document.getElementById('experience-container');
            const entry = document.createElement('div');
            entry.className = 'experience-entry';
            entry.dataset.experienceIndex = experienceCount - 1;
            entry.innerHTML = `
                <div class="experience-header">
                    <span class="experience-title">Position ${experienceCount}</span>
                    <button type="button" class="remove-btn" onclick="removeExperienceEntry(this)">Remove</button>
                </div>
                <div class="form-group">
                    <label>Company Name *</label>
                    <input type="text" class="exp-company" required>
                </div>
                <div class="form-group">
                    <label>Job Title *</label>
                    <input type="text" class="exp-role" required>
                </div>
                <div class="form-group">
                    <label>Dates (e.g., "Jan 2020 - Present") *</label>
                    <input type="text" class="exp-dates" required>
                </div>
                <div class="form-group">
                    <label>Key Achievements *</label>
                    <textarea class="exp-achievements" required></textarea>
                    <p class="form-hint">Bullet points with quantified results</p>
                </div>
            `;
            container.appendChild(entry);
        }

        function removeExperienceEntry(btn) {
            btn.closest('.experience-entry').remove();
            experienceCount--;
        }

        async function generateResume() {
            const form = document.getElementById('resume-form');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            // Collect form data
            const formData = {
                fullName: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                location: document.getElementById('location').value,
                linkedin: document.getElementById('linkedin').value,
                jobTitle: document.getElementById('jobTitle').value,
                skills: document.getElementById('skills').value,
                yearsExp: document.getElementById('yearsExp').value,
                industry: document.getElementById('industry').value,
                experience: [],
                degree: document.getElementById('degree').value,
                school: document.getElementById('school').value,
                gradYear: document.getElementById('gradYear').value,
                certifications: document.getElementById('certifications').value,
                languages: document.getElementById('languages').value
            };

            // Collect experience entries
            document.querySelectorAll('.experience-entry').forEach(entry => {
                formData.experience.push({
                    company: entry.querySelector('.exp-company').value,
                    role: entry.querySelector('.exp-role').value,
                    dates: entry.querySelector('.exp-dates').value,
                    achievements: entry.querySelector('.exp-achievements').value
                });
            });

            // Show loading
            document.getElementById('resume-form').style.display = 'none';
            document.getElementById('output-area').classList.add('visible');
            document.getElementById('loading').classList.add('active');

            try {
                // Call Anthropic API directly
                // PRODUCTION: Proxy this through a backend endpoint to protect API key
                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'x-api-key': 'YOUR_API_KEY_HERE',
                        'anthropic-version': '2023-06-01',
                        'content-type': 'application/json',
                        'anthropic-dangerous-direct-browser-access': 'true'
                    },
                    body: JSON.stringify({
                        model: 'claude-sonnet-4-20250514',
                        max_tokens: 1000,
                        system: 'You are an expert resume writer. Create an ATS-optimized, professional resume in clean HTML format. Use strong action verbs, quantified achievements, and industry keywords. Format with clear sections: Summary, Experience, Education, Skills. Output ONLY the HTML for the resume content, no markdown.',
                        messages: [{
                            role: 'user',
                            content: `Create a professional resume with the following information:

Name: ${formData.fullName}
Email: ${formData.email}
Phone: ${formData.phone}
Location: ${formData.location}
LinkedIn: ${formData.linkedin || 'Not provided'}

Target Role: ${formData.jobTitle}
Years of Experience: ${formData.yearsExp}
Industry: ${formData.industry}
Key Skills: ${formData.skills}

Education:
${formData.degree} from ${formData.school} (${formData.gradYear})

Work Experience:
${formData.experience.map(exp => `
Company: ${exp.company}
Position: ${exp.role}
Dates: ${exp.dates}
Achievements:
${exp.achievements}
`).join('\n---\n')}

${formData.certifications ? `Certifications: ${formData.certifications}` : ''}
${formData.languages ? `Languages: ${formData.languages}` : ''}

Generate a professional ATS-optimized resume with this information.`
                        }]
                    })
                });

                if (!response.ok) {
                    throw new Error('Failed to generate resume');
                }

                const data = await response.json();
                const resumeHtml = data.content[0].text;

                // Hide loading
                document.getElementById('loading').classList.remove('active');

                // Display resume
                const outputDiv = document.getElementById('resume-output');
                outputDiv.innerHTML = `<div class="resume-container">${resumeHtml}</div>`;

                showToast('Resume generated successfully!');
            } catch (error) {
                console.error('Resume generation error:', error);
                document.getElementById('loading').classList.remove('active');
                showToast('Error generating resume. Please try again.');
                document.getElementById('resume-form').style.display = 'block';
                document.getElementById('output-area').classList.remove('visible');
            }
        }
