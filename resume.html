<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Builder &#8212; Noc&#232;ne</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #09090e;
            --bg-secondary: #1a1a23;
            --text-primary: #ededf0;
            --text-secondary: #b8b8bf;
            --accent: #e8c87a;
            --accent-hover: #f0d493;
            --border: #2a2a35;
            --success: #4ade80;
            --error: #f87171;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'DM Serif Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .logo:hover {
            color: var(--accent-hover);
        }

        .credit-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background-color: var(--bg-primary);
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .credit-count {
            font-weight: 600;
            color: var(--accent);
        }

        main {
            flex: 1;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        /* Form Section */
        .form-section {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
        }

        .step-indicator {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2rem;
            position: relative;
        }

        .step-indicator::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            height: 2px;
            background-color: var(--border);
            z-index: 0;
        }

        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            position: relative;
            z-index: 1;
            flex: 1;
        }

        .step-number {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--bg-primary);
            border: 2px solid var(--border);
            font-weight: 700;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .step.active .step-number {
            background-color: var(--accent);
            border-color: var(--accent);
            color: var(--bg-primary);
        }

        .step.completed .step-number {
            background-color: var(--success);
            border-color: var(--success);
            color: var(--bg-primary);
        }

        .step-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-align: center;
            width: 70px;
        }

        .step.active .step-label {
            color: var(--accent);
        }

        .form-content {
            display: none;
        }

        .form-content.active {
            display: block;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.875rem;
            color: var(--text-primary);
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="url"],
        input[type="date"],
        textarea,
        select {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.875rem;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="tel"]:focus,
        input[type="url"]:focus,
        input[type="date"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(232, 200, 122, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        @media (max-width: 640px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        .experience-entry {
            background-color: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.25rem;
            margin-bottom: 1rem;
        }

        .experience-entry-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .experience-entry-title {
            font-weight: 600;
            color: var(--accent);
            font-size: 0.875rem;
        }

        .remove-btn {
            background-color: var(--bg-secondary);
            border: 1px solid var(--error);
            color: var(--error);
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .remove-btn:hover {
            background-color: var(--error);
            color: white;
        }

        .add-entry-btn {
            background-color: transparent;
            border: 1px dashed var(--accent);
            color: var(--accent);
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s;
            width: 100%;
            margin-top: 1rem;
        }

        .add-entry-btn:hover {
            background-color: rgba(232, 200, 122, 0.1);
        }

        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        button {
            flex: 1;
            padding: 0.875rem 1.5rem;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
        }

        .btn-primary {
            background-color: var(--accent);
            color: var(--bg-primary);
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(232, 200, 122, 0.2);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background-color: var(--bg-primary);
            border-color: var(--accent);
        }

        .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Resume Section */
        .resume-section {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
        }

        .resume-placeholder {
            background-color: var(--bg-primary);
            border: 2px dashed var(--border);
            border-radius: 8px;
            padding: 3rem 2rem;
            text-align: center;
            color: var(--text-secondary);
        }

        .resume-placeholder svg {
            width: 48px;
            height: 48px;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .resume-output {
            background-color: white;
            color: #333;
            padding: 2.5rem;
            border-radius: 8px;
            line-height: 1.8;
            max-height: 600px;
            overflow-y: auto;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 0.95rem;
        }

        .resume-output h1 {
            font-size: 1.75rem;
            margin-bottom: 0.25rem;
            color: #1a1a1a;
            font-weight: 700;
        }

        .resume-output .contact-info {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 1rem;
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 0.5rem;
        }

        .resume-output h2 {
            font-size: 1rem;
            margin-top: 1.25rem;
            margin-bottom: 0.5rem;
            color: #1a1a1a;
            font-weight: 700;
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 0.25rem;
        }

        .resume-output .entry {
            margin-bottom: 1rem;
        }

        .resume-output .entry-header {
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 0.25rem;
        }

        .resume-output .entry-subtitle {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 0.25rem;
        }

        .resume-output .entry-description {
            color: #444;
            font-size: 0.9rem;
            margin-left: 1rem;
        }

        .resume-actions {
            display: flex;
            gap: 1rem;
            margin-top: auto;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        .resume-actions button {
            flex: 1;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            color: var(--accent);
            font-weight: 500;
        }

        .loading::after {
            content: '';
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background-color: var(--accent);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }

        .error-message {
            background-color: rgba(248, 113, 113, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            font-size: 0.875rem;
        }

        .success-message {
            background-color: rgba(74, 222, 128, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            font-size: 0.875rem;
        }

        footer {
            background-color: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 2rem;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-top: 3rem;
        }

        .hidden {
            display: none !important;
        }

        @media print {
            body {
                background: white;
            }

            header,
            .form-section,
            .resume-actions,
            footer {
                display: none;
            }

            .resume-section {
                background: white;
                border: none;
                padding: 0;
            }

            .resume-output {
                max-height: none;
                overflow: visible;
                box-shadow: none;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">Noc&#232;ne</a>
        <div class="credit-badge">
            &#128196; <span class="credit-count" id="creditCount">-</span> credits
        </div>
    </header>

    <main>
        <div class="container">
            <!-- Form Section -->
            <div class="form-section">
                <div class="step-indicator">
                    <div class="step active" data-step="1">
                        <div class="step-number">1</div>
                        <div class="step-label">Personal Info</div>
                    </div>
                    <div class="step" data-step="2">
                        <div class="step-number">2</div>
                        <div class="step-label">Target Role</div>
                    </div>
                    <div class="step" data-step="3">
                        <div class="step-number">3</div>
                        <div class="step-label">Experience</div>
                    </div>
                    <div class="step" data-step="4">
                        <div class="step-number">4</div>
                        <div class="step-label">Education</div>
                    </div>
                </div>

                <!-- Step 1: Personal Info -->
                <form id="resumeForm">
                    <div class="form-content active" data-step="1">
                        <h2 style="margin-bottom: 1.5rem; color: var(--text-primary);">Personal Information</h2>
                        <div class="form-group">
                            <label for="fullName">Full Name</label>
                            <input type="text" id="fullName" name="fullName" required placeholder="John Smith">
                        </div>
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" required placeholder="john@example.com">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="phone">Phone Number</label>
                                <input type="tel" id="phone" name="phone" placeholder="+1 (555) 123-4567">
                            </div>
                            <div class="form-group">
                                <label for="location">Location</label>
                                <input type="text" id="location" name="location" placeholder="New York, NY">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="summary">Professional Summary (Optional)</label>
                            <textarea id="summary" name="summary" placeholder="Brief overview of your professional background and goals..."></textarea>
                        </div>
                    </div>

                    <!-- Step 2: Target Role -->
                    <div class="form-content" data-step="2">
                        <h2 style="margin-bottom: 1.5rem; color: var(--text-primary);">Target Role &#038; Goals</h2>
                        <div class="form-group">
                            <label for="targetRole">Target Job Title</label>
                            <input type="text" id="targetRole" name="targetRole" required placeholder="e.g., Senior Product Manager">
                        </div>
                        <div class="form-group">
                            <label for="industry">Desired Industry (Optional)</label>
                            <input type="text" id="industry" name="industry" placeholder="e.g., Technology, Finance, Healthcare">
                        </div>
                        <div class="form-group">
                            <label for="skills">Key Skills (comma-separated)</label>
                            <textarea id="skills" name="skills" placeholder="e.g., Project Management, Data Analysis, Leadership, Python, SQL"></textarea>
                        </div>
                        <div class="form-group">
                            <label for="careerGoals">Career Goals &#038; Objectives</label>
                            <textarea id="careerGoals" name="careerGoals" placeholder="What are your career aspirations? What type of role and company are you looking for?"></textarea>
                        </div>
                    </div>

                    <!-- Step 3: Experience -->
                    <div class="form-content" data-step="3">
                        <h2 style="margin-bottom: 1.5rem; color: var(--text-primary);">Work Experience (max 5 entries)</h2>
                        <div id="experienceContainer"></div>
                        <button type="button" class="add-entry-btn" id="addExperienceBtn">+ Add Experience</button>
                    </div>

                    <!-- Step 4: Education -->
                    <div class="form-content" data-step="4">
                        <h2 style="margin-bottom: 1.5rem; color: var(--text-primary);">Education</h2>
                        <div id="educationContainer"></div>
                        <button type="button" class="add-entry-btn" id="addEducationBtn">+ Add Education</button>
                    </div>

                    <!-- Form Actions -->
                    <div class="form-actions">
                        <button type="button" class="btn-secondary" id="prevBtn" disabled>Previous</button>
                        <button type="button" class="btn-primary" id="nextBtn">Next</button>
                    </div>
                </form>
            </div>

            <!-- Resume Section -->
            <div class="resume-section">
                <div class="resume-placeholder" id="resumePlaceholder">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="12" y1="11" x2="12" y2="17"></line>
                        <line x1="9" y1="14" x2="15" y2="14"></line>
                    </svg>
                    <p>Your generated resume will appear here</p>
                </div>
                <div class="resume-output hidden" id="resumeOutput"></div>
                <div class="resume-actions hidden" id="resumeActions">
                    <button type="button" class="btn-primary" id="printBtn">&#128439; Print / Save PDF</button>
                    <button type="button" class="btn-secondary" id="generateAnotherBtn">Generate Another</button>
                </div>
            </div>
        </div>
    </main>

    <footer>
        &#169; 2026 Noc&#232;ne. All rights reserved.
    </footer>

    <script src="credits.js"></script>
    <script src="https://app.lemonsqueezy.com/js/lemon.js" defer></script>

    <script>
        let currentStep = 1;
        const totalSteps = 4;
        let experienceCount = 0;
        let educationCount = 0;
        const maxExperience = 5;

        // Initialize form
        function initForm() {
            addExperienceEntry();
            addEducationEntry();
            updateStepIndicator();
        }

        // Step navigation
        function goToStep(step) {
            if (step < 1 || step > totalSteps) return;

            // Validate current step before moving
            if (!validateStep(currentStep)) {
                showError('Please fill in all required fields before proceeding.');
                return;
            }

            currentStep = step;
            updateForm();
            updateStepIndicator();
            document.querySelector('form').scrollIntoView({ behavior: 'smooth' });
        }

        function updateForm() {
            // Hide all form contents
            document.querySelectorAll('.form-content').forEach(el => el.classList.remove('active'));

            // Show current step
            document.querySelector(`[data-step="${currentStep}"]`).classList.add('active');

            // Update buttons
            document.getElementById('prevBtn').disabled = currentStep === 1;
            const nextBtn = document.getElementById('nextBtn');

            if (currentStep === totalSteps) {
                nextBtn.textContent = 'Generate Resume (1 credit)';
                nextBtn.classList.remove('btn-secondary');
                nextBtn.classList.add('btn-primary');
            } else {
                nextBtn.textContent = 'Next';
            }
        }

        function updateStepIndicator() {
            document.querySelectorAll('.step').forEach((step, index) => {
                const stepNum = index + 1;
                step.classList.remove('active', 'completed');

                if (stepNum === currentStep) {
                    step.classList.add('active');
                } else if (stepNum < currentStep) {
                    step.classList.add('completed');
                }
            });
        }

        function validateStep(step) {
            const fullName = document.getElementById('fullName')?.value?.trim();
            const email = document.getElementById('email')?.value?.trim();
            const targetRole = document.getElementById('targetRole')?.value?.trim();
            const skills = document.getElementById('skills')?.value?.trim();

            switch(step) {
                case 1:
                    return fullName && email;
                case 2:
                    return targetRole && skills;
                case 3:
                    return document.querySelectorAll('.experience-entry').length > 0;
                case 4:
                    return document.querySelectorAll('.education-entry').length > 0;
                default:
                    return true;
            }
        }

        // Experience management
        function addExperienceEntry() {
            if (experienceCount >= maxExperience) return;

            const container = document.getElementById('experienceContainer');
            const entry = document.createElement('div');
            entry.className = 'experience-entry';
            entry.dataset.id = experienceCount;

            entry.innerHTML = `
                <div class="experience-entry-header">
                    <div class="experience-entry-title">Position ${experienceCount + 1}</div>
                    <button type="button" class="remove-btn" onclick="removeExperienceEntry(${experienceCount})">Remove</button>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Job Title</label>
                        <input type="text" class="exp-title" placeholder="e.g., Senior Manager">
                    </div>
                    <div class="form-group">
                        <label>Company</label>
                        <input type="text" class="exp-company" placeholder="e.g., Tech Corp">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>@Utart Date</label>
                        <input type="date" class="exp-start">
                    </div>
                    <div class="form-group">
                        <label>End Date</label>
                        <input type="date" class="exp-end">
                    </div>
                </div>
                <div class="form-group">
                    <label>Description &#038; Achievements</label>
                    <textarea class="exp-description" placeholder="Describe your role, key responsibilities, and accomplishments..."></textarea>
                </div>
            `;

            container.appendChild(entry);
            experienceCount++;            updateAddExperienceButton();
        }

        function removeExperienceEntry(id) {
            document.querySelector(`[data-id="${id}"]`)?.remove();
            updateAddExperienceButton();
        }

        function updateAddExperienceButton() {
            const btn = document.getElementById('addExperienceBtn');
            btn.disabled = experienceCount >= maxExperience;
            btn.style.opacity = btn.disabled ? '0.5' : '1';
            btn.style.cursor = btn.disabled ? 'not-allowed' : 'pointer';
        }

        // Education management
        function addEducationEntry() {
            const container = document.getElementById('educationContainer');
            const entryCount = container.children.length;
            const entry = document.createElement('div');
            entry.className = 'experience-entry education-entry';
            entry.dataset.id = entryCount;

            entry.innerHTML = `
                <div class="experience-entry-header">
                    <div class="experience-entry-title">Education ${entryCount + 1}</div>
                    <button type="button" class="remove-btn" onclick="removeEducationEntry(${entryCount})">Remove</button>
                </div>
                <div class="form-group">
                    <label>Degree</label>
                    <input type="text" class="edu-degree" placeholder="e.g., Bachelor of Science">
                </div>
                <div class="form-group">
                    <label>Field of Study</label>
                    <input type="text" class="edu-field" placeholder="e.g., Computer Science">
                </div>
                <div class="form-group">
                    <label>Institution</label>
                    <input type="text" class="edu-institution" placeholder="e.g., Harvard University">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Graduation Year</label>
                        <input type="text" class="edu-iear" placeholder="e.g., 2020">
                    </div>
                    <div class="form-group">
                        <label>GPA (Optional)</label>
                        <input type="text" class="edu-gpa" placeholder="e.g., 3.8">
                    </div>
                </div>
            `;

            container.appendChild(entry);
        }

        function removeEducationEntry(id) {
            const container = document.getElementById('educationContainer');
            const entries = container.querySelectorAll('.education-entry');
            if (entries.length > 1) {
                entries[id].remove();
            }
        }

        // Form submission
        document.getElementById('nextBtn').addEventListener('click', async (e) => {
            e.preventDefault();

            if (currentStep === totalSteps) {
                // Generate resume
                generateResume();
            } else {
                goToStep(currentStep + 1);
            }
        });

        document.getElementById('prevBtn').addEventListener('click', (e) => {
            e.preventDefault();
            goToStep(currentStep - 1);
        });

        document.getElementById('addExperienceBtn').addEventListener('click', (e) => {
            e.preventDefault();
            addExperienceEntry();
        });

        document.getElementById('addEducationBtn').addEventListener('click', (e) => {
            e.preventDefault();
            addEducationEntry();
        });

        // Resume generation
        async function generateResume() {
            // Check credit requirement
            if (typeof Nocene !== 'undefined' && Nocene.requireCredit) {
                const hasCredit = await Nocene.requireCredit('AI Resume Builder');
                if (!hasCredit) {
                    showError('Insufficient credits. Please add credits to continue.');
                    return;
                }
            }

            showLoading();

            try {
                const resumeData = gatherFormData();
                const userMessage = formatResumePrompt(resumeData);

                const systemPromtt = `You are an expert resume writer and career coach with 20+ years of experience. Your task is to generate a professional, compelling resume based on the user's information.

Guidelines:
- Tailor the resume to the target role and industry
- Use action verbs and quantifiable achievements where possible
- Maintain a professional tone and formatting
- Highlight relevant skills and experience
- Keep it concise yet impactful
- Use industry-specific keywords appropriate for the target role

Format the resume in a clean, ATS-friendly structure with clear sections.`;

                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'content-type': 'application/json' },
                    body: JSON.stringify({
                        model: 'claude-sonnet-4-20250514',
                        max_tokens: 2000,
                        system: systemPrompt,
                        messages: [{ role: 'user', content: userMessage }]
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || 'Failed to generate resume');
                }

                const data = await response.json();
                const resumeContent = data.content || data.text;

                displayResume(resumeContent);
                hideLoading();
            } catch (error) {
                hideLoading();
                showError('Error generating resume: ' + error.message);
            }
        }

        function gatherFormData() {
            const data = {
                personalInfo: {
                    fullName: document.getElementById('fullName').value,
                    email: document.getElementById('email').value,
                    phone: document.getElementById('phone').value,
                    location: document.getElementById('location').value,
                    summary: document.getElementById('summary').value
                },
                targetRole: {
                    title: document.getElementById('targetRole').value,
                    industry: document.getElementById('industry').value,
                    skills: document.getElementById('skills').value,
                    goals: document.getElementById('careerGoals').value
                },
                experience: [],
                education: []
            };

            // Gather experience
            document.querySelectorAll('.experience-entry').forEach(entry => {
                data.experience.push({
                    title: entry.querySelector('.exp-title').value,
                    company: entry.querySelector('.exp-company').value,
                    startDate: entry.querySelector('.exp-start').value,
                    endDate: entry.querySelector('.exp-end').value,
                    description: entry.querySelector('.exp-description').value
                });
            });

            // Gather education
            document.querySelectorAll('.education-entry').forEach(entry => {
                data.education.push({
                    degree: entry.querySelector('.edu-degree').value,
                    field: entry.querySelector('.edu-field').value,
                    institution: entry.querySelector('.edu-institution').value,
                    year: entry.querySelector('.edu-year').value,
                    gpa: entry.querySelector('.edu-gpa').value
                });
            });

            return data;
        }

        function formatResumePrompt(data) {
            let prompt = `Please generate a professional resume based on the following information:\n\n`;

            prompt += `PERSONAL INFORMATION:\n`;
            prompt += `Name: ${data.personalInfo.fullName}\n`;
            prompt += `Email: ${data.personalInfo.email}\n`;
            if (data.personalInfo.phone) prompt += `Phone: ${data.personalInfo.phone}\n`;
            if (data.personalInfo.location) prompt += `Location: ${data.personalInfo.location}\n`;
            if (data.personalInfo.summary) prompt += `Professional Summary: ${data.personalInfo.summary}\n`;

            prompt += `\nTARGET ROLE:\n`;
            prompt += `Position: ${data.targetRole.title}\n`;
            if (data.targetRole.industry) prompt += `Industry: ${data.targetRole.industry}\n`;
            prompt += `Key Skills: ${data.targetRole.skills}\n`;
            if (data.targetRole.goals) prompt += `Career Goals: ${data.targetRole.goals}\n`;

            prompt += `\nWORK EXPERIENCE:\n`;
            data.experience.forEach((exp, i) => {
                if (exp.title || exp.company) {
                    prompt += `\n${i + 1}. ${exp.title || 'Position'} at ${exp.company || 'Company'}\n`;
                    if (exp.startDate) prompt += `   Start: ${exp.startDate}\n`;
                    if (exp.endDate) prompt += `   End: ${exp.endDate}\n`;
                    if (exp.description) prompt += `   ${exp.description}\n`;
                }
            });

            prompt += `\nEDUCATION:\n`;
            data.education.forEach((edu, i) => {
                if (edu.degree || edu.institution) {
                    prompt += `\n${i + 1}. ${edu.degree || 'Degree'} in ${edu.field || 'Field of Study'}\n`;
                    prompt += `   ${edu.institution || 'Institution'}\n`;
                    if (edu.year) prompt += `   Graduation: ${edu.year}\n`;
                    if (edu.gpa) prompt += `   GPA: ${edu.gpa}\n`;
                }
            });

            prompt += `\n\nPlease create a professional, ATS-friendly resume that highlights the user's strengths for the "${data.targetRole.title}" position. Format it clearly with proper sections.`;

            return prompt;
        }

        function displayResume(content) {
            const output = document.getElementById('resumeOutput');
            output.innerHTML = `<pre style="white-space: pre-wrap; word-wrap: break-word; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 0.95rem;">${escapeHtml(content)}</pre>`;

            document.getElementById('resumePlaceholder').classList.add('hidden');
            output.classList.remove('hidden');
            document.getElementById('resumeActions').classList.remove('hidden');
        }

        function escapeHtml(text) {
            const map = {
                '&&: '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        function showLoading() {
            const placeholder = document.getElementById('resumePlaceholder');
            placeholder.innerHTML = '<div class="loading">Generating your resume</div>';
            placeholder.classList.remove('hidden');
        }

        function hideLoading() {
            // Resume will be displayed via displayResume
        }

        function showError(message) {
            const placeholder = document.getElementById('resumePlaceholder');
            placeholder.classList.remove('hidden');
            placeholder.innerHTML = `<div class="error-message">${escapeHtml(message)}</div>`;
        }

        document.getElementById('printBtn').addEventListener('click', () => {
            window.print();
        });

        document.getElementById('generateAnotherBtn').addEventListener('click', () => {
            document.getElementById('resumeOutput').classList.add('hidden');
            document.getElementById('resumePlaceholder').classList.remove('hidden');
            document.getElementById('resumeActions').classList.add('hidden');
            currentStep = 1;
            updateForm();
            updateStepIndicator();
        });

        // Update credit display
        function updateCreditDisplay() {
            if (typeof Nocene !== 'undefined' && Nocene.credits !== undefined) {
                document.getElementById('creditCount').textContent = Nocene.credits;
            }
        }

        // Initialize
        initForm();
        updateCreditDisplay();
        if (typeof Nocene !== 'undefined' && Nocene.onCreditsUpdated) {
            Nocene.onCreditsUpdated(updateCreditDisplay);
        }
    </script>
</body>
</html>
