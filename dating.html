<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Dating Profile Writer &#8212; Noc&#232;ne</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display:wght@400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            background: #09090e;
            color: #ededf0;
            font-family: 'DM Sans', sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
            border-bottom: 1px solid rgba(232, 200, 122, 0.1);
        }

        .logo {
            font-family: 'DM Serif Display', serif;
            font-size: 1.5rem;
            font-weight: 400;
            color: #e8c87a;
            text-decoration: none;
            letter-spacing: 1px;
        }

        .logo:hover {
            color: #f0d494;
        }

        .credit-badge-count {
            background: rgba(232, 200, 122, 0.1);
            border: 1px solid #e8c87a;
            color: #e8c87a;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .credit-badge-count:hover {
            background: rgba(232, 200, 122, 0.2);
        }

        /* Main content */
        main {
            flex: 1;
            padding: 3rem 2rem;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .container {
            width: 100%;
        }

        h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 2.5rem;
            font-weight: 400;
            margin-bottom: 0.5rem;
            color: #ededf0;
        }

        .subtitle {
            color: rgba(237, 237, 240, 0.7);
            margin-bottom: 2rem;
            font-size: 1.125rem;
        }

        /* Step indicator */
        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }

        .step-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(232, 200, 122, 0.1);
            border: 2px solid rgba(232, 200, 122, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: rgba(237, 237, 240, 0.6);
            font-size: 1.125rem;
            transition: all 0.3s ease;
        }

        .step-circle.active {
            background: #e8c87a;
            border-color: #e8c87a;
            color: #09090e;
        }

        .step-circle.completed {
            background: rgba(232, 200, 122, 0.5);
            border-color: #e8c87a;
            color: #09090e;
        }

        /* Form */
        .form-section {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .form-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #ededf0;
            font-size: 0.95rem;
        }

        input[type="text"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(232, 200, 122, 0.05);
            border: 1px solid rgba(232, 200, 122, 0.2);
            border-radius: 8px;
            color: #ededf0;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            background: rgba(232, 200, 122, 0.1);
            border-color: #e8c87a;
            box-shadow: 0 0 0 2px rgba(232, 200, 122, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        /* Radio group for multiple choice */
        .radio-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .radio-item {
            position: relative;
        }

        .radio-item input[type="radio"] {
            display: none;
        }

        .radio-label {
            display: flex;
            align-items: center;
            padding: 0.875rem 1rem;
            background: rgba(232, 200, 122, 0.05);
            border: 2px solid rgba(232, 200, 122, 0.2);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            margin: 0;
        }

        .radio-item input[type="radio"]:checked + .radio-label {
            background: rgba(232, 200, 122, 0.2);
            border-color: #e8c87a;
            color: #e8c87a;
        }

        .radio-label:before {
            content: '';
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid rgba(232, 200, 122, 0.5);
            margin-right: 0.75rem;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .radio-item input[type="radio"]:checked + .radio-label:before {
            background: #e8c87a;
            border-color: #e8c87a;
        }

        /* Buttons */
        .button-group {
            display: flex;
            gap: 1rem;
            margin-top: 3rem;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        button {
            padding: 0.875rem 1.75rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'DM Sans', sans-serif;
        }

        .btn-secondary {
            background: rgba(232, 200, 122, 0.1);
            color: #e8c87a;
            border: 1px solid #e8c87a;
        }

        .btn-secondary:hover {
            background: rgba(232, 200, 122, 0.2);
        }

        .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: #e8c87a;
            color: #09090e;
        }

        .btn-primary:hover {
            background: #f0d494;
            transform: translateY(-2px);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Output section */
        .output-section {
            display: none;
            margin-top: 3rem;
        }

        .output-section.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .output-title {
            font-family: 'DM Serif Display', serif;
            font-size: 2rem;
            margin-bottom: 2rem;
            color: #ededf0;
        }

        .output-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .card {
            background: rgba(232, 200, 122, 0.05);
            border: 1px solid rgba(232, 200, 122, 0.2);
            border-radius: 12px;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }

        .card:hover {
            background: rgba(232, 200, 122, 0.1);
            border-color: rgba(232, 200, 122, 0.4);
        }

        .card-title {
            font-weight: 700;
            margin-bottom: 1rem;
            color: #e8c87a;
            font-size: 1.125rem;
        }

        .card-content {
            font-size: 0.95rem;
            line-height: 1.8;
            color: rgba(237, 237, 240, 0.9);
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .prompt-item {
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid rgba(232, 200, 122, 0.1);
        }

        .prompt-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .prompt-question {
            color: #e8c87a;
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .prompt-answer {
            color: rgba(237, 237, 240, 0.85);
        }

        .opener-item {
            margin-bottom: 0.75rem;
            padding: 0.75rem;
            background: rgba(232, 200, 122, 0.05);
            border-left: 3px solid #e8c87a;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        /* Loading state */
        .loading {
            display: none;
            text-align: center;
            padding: 2rem;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 3px solid rgba(232, 200, 122, 0.2);
            border-top: 3px solid #e8c87a;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            color: rgba(237, 237, 240, 0.7);
        }

        /* Error state */
        .error-message {
            display: none;
            background: rgba(255, 80, 80, 0.1);
            border: 1px solid rgba(255, 80, 80, 0.3);
            color: #ff6b6b;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .error-message.active {
            display: block;
        }

        /* Footer */
        footer {
            border-top: 1px solid rgba(232, 200, 122, 0.1);
            padding: 2rem;
            text-align: center;
            color: rgba(237, 237, 240, 0.5);
            font-size: 0.875rem;
            margin-top: auto;
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.875rem;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }

            .step-indicator {
                gap: 0.5rem;
            }

            .step-circle {
                width: 40px;
                height: 40px;
                font-size: 0.95rem;
            }

            .output-cards {
                grid-template-columns: 1fr;
            }

            nav {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }

            main {
                padding: 1.5rem 1rem;
            }

            .radio-group {
                grid-template-columns: 1fr;
            }
        }

        /* Copy button */
        .copy-btn {
            background: transparent;
            color: #e8c87a;
            border: 1px solid #e8c87a;
            padding: 0.5rem 0.75rem;
            font-size: 0.85rem;
            margin-top: 0.75rem;
            width: auto;
        }

        .copy-btn:hover {
            background: rgba(232, 200, 122, 0.1);
        }

        .copy-btn.copied {
            background: rgba(100, 200, 100, 0.2);
            border-color: #64c864;
            color: #64c864;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">Noc&#232;ne</a>
        <div class="credit-badge-count">0 Credits</div>
    </nav>

    <main>
        <div class="container">
            <h1>AI Dating Profile Writer</h1>
            <p class="subtitle">Craft the perfect dating profile in minutes</p>

            <div class="step-indicator">
                <div class="step-circle active" data-step="1">1</div>
                <div class="step-circle" data-step="2">2</div>
                <div class="step-circle" data-step="3">3</div>
            </div>

            <div class="error-message" id="errorMessage"></div>

            <!-- Step 1: Basics -->
            <form id="profileForm">
                <div class="form-section active" data-step="1">
                    <h2 style="font-family: 'DM Serif Display', serif; font-size: 1.5rem; margin-bottom: 1.5rem; color: #ededf0;">Basic Information</h2>

                    <div class="form-group">
                        <label for="name">Your Name</label>
                        <input type="text" id="name" name="name" required>
                    </div>

                    <div class="form-group">
                        <label for="age">Age</label>
                        <input type="number" id="age" name="age" min="18" max="120" required>
                    </div>

                    <div class="form-group">
                        <label for="gender">Gender</label>
                        <select id="gender" name="gender" required>
                            <option value="">Select your gender</option>
                            <option value="man">Man</option>
                            <option value="woman">Woman</option>
                            <option value="non-binary">Non-binary</option>
                            <option value="prefer-not-to-say">Prefer not to say</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="app">Dating App</label>
                        <select id="app" name="app" required>
                            <option value="">Select a dating app</option>
                            <option value="tinder">Tinder</option>
                            <option value="bumble">Bumble</option>
                            <option value="hinge">Hinge</option>
                            <option value="coffee-meets-bagel">Coffee Meets Bagel</option>
                            <option value="other">Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Your Vibe</label>
                        <div class="radio-group">
                            <div class="radio-item">
                                <input type="radio" id="vibe1" name="vibe" value="witty-sarcastic" required>
                                <label for="vibe1" class="radio-label">Witty &amp; Sarcastic</label>
                            </div>
                            <div class="radio-item">
                                <input type="radio" id="vibe2" name="vibe" value="warm-genuine">
                                <label for="vibe2" class="radio-label">Warm &amp; Genuine</label>
                            </div>
                            <div class="radio-item">
                                <input type="radio" id="vibe3" name="vibe" value="adventurous">
                                <label for="vibe3" class="radio-label">Adventurous</label>
                            </div>
                            <div class="radio-item">
                                <input type="radio" id="vibe4" name="vibe" value="intellectual">
                                <label for="vibe4" class="radio-label">Intellectual</label>
                            </div>
                            <div class="radio-item">
                                <input type="radio" id="vibe5" name="vibe" value="chill-laid-back">
                                <label for="vibe5" class="radio-label">Chill &amp; Laid-back</label>
                            </div>
                        </div>
                    </div>

                    <div class="button-group">
                        <button type="button" class="btn-secondary" onclick="nextStep()" style="width: 100%;">Next: About You &#8594;</button>
                    </div>
                </div>

                <!-- Step 2: About You -->
                <div class="form-section" data-step="2">
                    <h2 style="font-family: 'DM Serif Display', serif; font-size: 1.5rem; margin-bottom: 1.5rem; color: #ededf0;">About You</h2>

                    <div class="form-group">
                        <label for="occupation">Occupation</label>
                        <input type="text" id="occupation" name="occupation" placeholder="e.g., Software Engineer, Graphic Designer" required>
                    </div>

                    <div class="form-group">
                        <label for="hobbies">Hobbies &amp; Interests</label>
                        <textarea id="hobbies" name="hobbies" placeholder="What do you enjoy doing? (e.g., hiking, cooking, reading, gaming)" required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="funFacts">Fun Facts</label>
                        <textarea id="funFacts" name="funFacts" placeholder="Share some interesting things about yourself" required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="unique">What Makes You Unique?</label>
                        <textarea id="unique" name="unique" placeholder="What should people know about you that makes you stand out?" required></textarea>
                    </div>

                    <div class="button-group">
                        <button type="button" class="btn-secondary" onclick="prevStep();">&#8592; Back</button>
                        <button type="button" class="btn-secondary" onclick="nextStep();">Next: What You Want &#8594;</button>
                    </div>
                </div>

                <!-- Step 3: What You Want -->
                <div class="form-section" data-step="3">
                    <h2 style="font-family: 'DM Serif Display', serif; font-size: 1.5rem; margin-bottom: 1.5rem; color: #ededf0;">What You&rsquo;re Looking For</h2>

                    <div class="form-group">
                        <label for="lookingFor">Looking For</label>
                        <select id="lookingFor" name="lookingFor" required>
                            <option value="">Select what you&rsquo;re looking for</option>
                            <option value="casual-dating">Casual Dating</option>
                            <option value="serious-relationship">Serious Relationship</option>
                            <option value="not-sure">Not Sure Yet</option>
                            <option value="open-to-anything">Open to Anything</option>
                            <option value="friendship">Friendship</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="dealbreakers">Dealbreakers (Optional)</label>
                        <textarea id="dealbreakers" name="dealbreakers" placeholder="What are your dealbreakers? (This helps AI avoid problematic suggestions)"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="firstDate">Ideal First Date (Optional)</label>
                        <textarea id="firstDate" name="firstDate" placeholder="Describe your ideal first date scenario"></textarea>
                    </div>

                    <div class="button-group">
                        <button type="button" class="btn-secondary" onclick="prevStep();">&#8592; Back</button>
                        <button type="button" class="btn-primary" onclick="generateProfile();" id="generateBtn">Generate Profile (1 credit)</button>
                    </div>
                </div>
            </form>

            <!-- Output Section -->
            <div class="output-section" id="outputSection">
                <h2 class="output-title">Your Profile</h2>

                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p class="loading-text">Creating your perfect profile...</p>
                </div>

                <div class="output-cards" id="outputCards" style="display: none;">
                    <!-- Bio Card -->
                    <div class="card">
                        <div class="card-title">Bio</div>
                        <div class="card-content" id="bioOutput"></div>
                        <button type="button" class="copy-btn" onclick="copyToClipboard('bioOutput', this)">Copy Bio</button>
                    </div>

                    <!-- Hinge Prompt Answers Card -->
                    <div class="card" style="grid-column: span 2;">
                        <div class="card-title">Hinge Prompt Answers</div>
                        <div class="card-content" id="promptsOutput"></div>
                        <button type="button" class="copy-btn" onclick="copyToClipboard('promptsOutput', this)">Copy All Prompts</button>
                    </div>

                    <!-- Conversation Starters Card -->
                    <div class="card" style="grid-column: span 1;">
                        <div class="card-title">Conversation Starters</div>
                        <div class="card-content" id="openersOutput"></div>
                        <button type="button" class="copy-btn" onclick="copyToClipboard('openersOutput', this)">Copy Openers</button>
                    </div>
                </div>

                <div class="button-group" id="finalButtonGroup" style="display: none;">
                    <button type="button" class="btn-secondary" onclick="savePDF();">&#x1F4BE; Save as PDF</button>
                    <button type="button" class="btn-primary" onclick="generateAnother();">Generate Another</button>
                </div>
            </div>
        </div>
    </main>

    <footer>
        &copy; 2026 Noc&#232;ne. All rights reserved.
    </footer>

    <script src="credits.js"></script>
    <script src="https://app.lemonsqueezy.com/js/lemon.js" defer></script>

    <script>
        let currentStep = 1;
        const totalSteps = 3;

        function showStep(step) {
            document.querySelectorAll('.form-section').forEach(section => {
                section.classList.remove('active');
            });
            document.querySelector(`.form-section[data-step="${step}"]`).classList.add('active');

            document.querySelectorAll('.step-circle').forEach((circle, index) => {
                const circleStep = index + 1;
                circle.classList.remove('active', 'completed');
                if (circleStep === step) {
                    circle.classList.add('active');
                } else if (circleStep < step) {
                    circle.classList.add('completed');
                }
            });

            currentStep = step;
        }

        function nextStep() {
            if (validateCurrentStep()) {
                if (currentStep < totalSteps) {
                    showStep(currentStep + 1);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            }
        }

        function prevStep() {
            if (currentStep > 1) {
                showStep(currentStep - 1);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function validateCurrentStep() {
            const section = document.querySelector(`.form-section[data-step="${currentStep}"]`);
            const inputs = section.querySelectorAll('input[required], select[required], textarea[required]');
            let isValid = true;

            inputs.forEach(input => {
                if (!input.value.trim()) {
                    isValid = false;
                    input.style.borderColor = '#ff6b6b';
                } else {
                    input.style.borderColor = '';
                }
            });

            return isValid;
        }

        function getFormData() {
            return {
                name: document.getElementById('name').value,
                age: document.getElementById('age').value,
                gender: document.getElementById('gender').value,
                app: document.getElementById('app').value,
                vibe: document.querySelector('input[name="vibe"]:checked').value,
                occupation: document.getElementById('occupation').value,
                hobbies: document.getElementById('hobbies').value,
                funFacts: document.getElementById('funFacts').value,
                unique: document.getElementById('unique').value,
                lookingFor: document.getElementById('lookingFor').value,
                dealbreakers: document.getElementById('dealbreakers').value,
                firstDate: document.getElementById('firstDate').value
            };
        }

        function generateProfile() {
            if (!validateCurrentStep()) {
                return;
            }

            // Check credits
            if (typeof Nocene !== 'undefined' && Nocene.requireCredit) {
                if (!Nocene.requireCredit()) {
                    showError('You don\'t have enough credits. Please purchase credits to continue.');
                    return;
                }
            }

            const formData = getFormData();

            // Show loading state
            document.getElementById('outputSection').classList.add('active');
            document.getElementById('loading').classList.add('active');
            document.getElementById('outputCards').style.display = 'none';
            document.getElementById('finalButtonGroup').style.display = 'none';

            window.scrollTo({ top: document.getElementById('outputSection').offsetTop - 100, behavior: 'smooth' });

            // Build system prompt
            const systemPrompt = `You are an expert dating profile writer. Create compelling, authentic dating profiles that help people find genuine connections. Generate profiles that reflect the user's personality while highlighting their best qualities. Be creative, witty when appropriate, and honest.

The user will provide their information. Respond ONLY with valid JSON in this exact format, no additional text:
{
  "bio": "A compelling 2-3 sentence bio for their profile",
  "prompts": [
    {
      "prompt": "Hinge prompt question",
      "answer": "Answer to the prompt"
    },
    {
      "prompt": "Another hinge prompt",
      "answer": "Answer to this prompt"
    }
  ],
  "openers": [
    "A creative conversation starter",
    "Another opener line",
    "A third option"
  ]
}`;

            const userMessage = `Create a dating profile for:
- Name: ${formData.name}
- Age: ${formData.age}
- Gender: ${formData.gender}
- Dating App: ${formData.app}
- Vibe: ${formData.vibe}
- Occupation: ${formData.occupation}
- Hobbies & Interests: ${formData.hobbies}
- Fun Facts: ${formData.funFacts}
- What Makes Them Unique: ${formData.unique}
- Looking For: ${formData.lookingFor}
- Dealbreakers: ${formData.dealbreakers || 'None specified'}
- Ideal First Date: ${formData.firstDate || 'Not specified'}

Create a profile that authentically represents them, is tailored to their chosen dating app, matches their vibe, and will help them make great connections.`;

            fetch('/api/generate', {
                method: 'POST',
                headers: { 'content-type': 'application/json' },
                body: JSON.stringify({
                    model: 'claude-sonnet-4-20250514',
                    max_tokens: 1000,
                    system: systemPrompt,
                    messages: [{ role: 'user', content: userMessage }]
                })
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error(`API error: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                if (data.error) {
                    throw new Error(data.error);
                }

                const content = data.content || data.text || '';
                const jsonMatch = content.match(/\{[\s\S]*\}/);

                if (!jsonMatch) {
                    throw new Error('Invalid response format');
                }

                const profileData = JSON.parse(jsonMatch[0]);
                displayProfile(profileData);
            })
            .catch(error => {
                console.error('Generation error:', error);
                showError('Failed to generate profile: ' + error.message);
                document.getElementById('loading').classList.remove('active');
            });
        }

        function displayProfile(profileData) {
            document.getElementById('loading').classList.remove('active');
            document.getElementById('outputCards').style.display = 'grid';
            document.getElementById('finalButtonGroup').style.display = 'flex';

            // Display bio
            document.getElementById('bioOutput').textContent = profileData.bio;

            // Display prompts
            let promptsHTML = '';
            if (profileData.prompts && Array.isArray(profileData.prompts)) {
                profileData.prompts.forEach(p => {
                    promptsHTML += `<div class="prompt-item">
                        <div class="prompt-question">Q: ${p.prompt}</div>
                        <div class="prompt-answer">A: ${p.answer}</div>
                    </div>`;
                });
            }
            document.getElementById('promptsOutput').innerHTML = promptsHTML;

            // Display openers
            let openersHTML = '';
            if (profileData.openers && Array.isArray(profileData.openers)) {
                profileData.openers.forEach(opener => {
                    openersHTML += `<div class="opener-item">${opener}</div>`;
                });
            }
            document.getElementById('openersOutput').innerHTML = openersHTML;
        }

        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.classList.add('active');
            setTimeout(() => {
                errorEl.classList.remove('active');
            }, 5000);
        }

        function copyToClipboard(elementId, button) {
            const element = document.getElementById(elementId);
            const text = element.textContent;

            navigator.clipboard.writeText(text).then(() => {
                const originalText = button.textContent;
                button.textContent = '✓ Copied!';
                button.classList.add('copied');

                setTimeout(() => {
                    button.textContent = originalText;
                    button.classList.remove('copied');
                }, 2000);
            }).catch(err => {
                console.error('Copy failed:', err);
            });
        }

        function savePDF() {
            if (typeof window.print === 'function') {
                window.print();
            } else {
                showError('PDF save not supported in this browser. Please use Print instead.');
            }
        }

        function generateAnother() {
            document.getElementById('outputSection').classList.remove('active');
            document.getElementById('errorMessage').classList.remove('active');
            showStep(1);

            // Reset form
            document.getElementById('profileForm').reset();
            document.querySelector('input[name="vibe"]').checked = false;

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Initialize
        showStep(1);

        // Add real-time validation
        document.querySelectorAll('input[required], select[required], textarea[required]').forEach(input => {
            input.addEventListener('change', () => {
                if (input.value.trim()) {
                    input.style.borderColor = '';
                }
            });
        });
    </script>
</body>
</html>
