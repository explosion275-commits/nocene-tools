<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Language Learning Sets | Noc&#232;ne</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Serif+Display:wght@400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            background-color: #09090e;
            color: #ededf0;
            font-family: 'DM Sans', sans-serif;
            line-height: 1.6;
        }

        /* Navigation */
        nav {
            position: sticky;
            top: 0;
            background-color: #0f0f14;
            border-bottom: 1px solid #1a1a22;
            padding: 1.25rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .nav-logo {
            font-family: 'DM Serif Display', serif;
            font-size: 1.5rem;
            font-weight: 400;
            text-decoration: none;
            color: #ededf0;
            transition: color 0.3s ease;
        }

        .nav-logo:hover {
            color: #e8c87a;
        }

        .credit-badge-count {
            background-color: #1a1a22;
            border: 1px solid #2a2a32;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.875rem;
            color: #ededf0;
        }

        /* Main Container */
        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 2.5rem;
            font-weight: 400;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #a8a8b0;
            margin-bottom: 3rem;
            font-size: 1rem;
        }

        /* Selection Sections */
        .selection-section {
            margin-bottom: 3rem;
        }

        .section-title {
            font-family: 'DM Serif Display', serif;
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 1.5rem;
            color: #ededf0;
        }

        /* Card Grid */
        .card-grid {
            display: grid;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .languages-grid {
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        }

        .levels-grid {
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        }

        .topics-grid {
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        }

        /* Card Styles */
        .card {
            background-color: #0f0f14;
            border: 2px solid #1a1a22;
            border-radius: 8px;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            font-weight: 500;
        }

        .card:hover {
            border-color: #2a2a32;
            background-color: #14141b;
        }

        .card.selected {
            background-color: #e8c87a;
            color: #09090e;
            border-color: #e8c87a;
            font-weight: 700;
        }

        /* Action Button */
        .generate-section {
            display: flex;
            justify-content: center;
            margin: 3rem 0;
        }

        .generate-btn {
            background-color: #e8c87a;
            color: #09090e;
            border: none;
            padding: 1rem 2.5rem;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'DM Sans', sans-serif;
        }

        .generate-btn:hover:not(:disabled) {
            background-color: #f5d798;
            transform: translateY(-2px);
        }

        .generate-btn:disabled {
            background-color: #5a5a62;
            color: #a8a8b0;
            cursor: not-allowed;
        }

        /* Loading State */
        .loading {
            display: none;
            text-align: center;
            padding: 2rem;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 3px solid #1a1a22;
            border-top: 3px solid #e8c87a;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Output Section */
        .output-section {
            display: none;
            margin-top: 3rem;
        }

        .output-section.active {
            display: block;
        }

        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid #1a1a22;
        }

        .tab-btn {
            background: none;
            border: none;
            color: #a8a8b0;
            padding: 1rem;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
            font-family: 'DM Sans', sans-serif;
        }

        .tab-btn.active {
            color: #e8c87a;
            border-bottom-color: #e8c87a;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .flashcard-set {
            background-color: #0f0f14;
            border: 1px solid #1a1a22;
            border-radius: 8px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .flashcard {
            background-color: #14141b;
            border: 1px solid #1a1a22;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .flashcard:hover {
            border-color: #2a2a32;
            background-color: #1a1a22;
        }

        .flashcard.flipped {
            background-color: #e8c87a;
            color: #09090e;
        }

        .flashcard-word {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .flashcard-translation {
            font-size: 1rem;
            opacity: 0.8;
        }

        .vocab-list {
            background-color: #0f0f14;
            border: 1px solid #1a1a22;
            border-radius: 8px;
        }

        .vocab-item {
            padding: 1rem;
            border-bottom: 1px solid #1a1a22;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .vocab-item:last-child {
            border-bottom: none;
        }

        .vocab-word {
            font-weight: 600;
            color: #e8c87a;
        }

        .vocab-translation {
            color: #a8a8b0;
        }

        /* Responsive */
        @media (max-width: 768px) {
            main {
                padding: 1.5rem 1rem;
            }

            h1 {
                font-size: 1.75rem;
            }

            .section-title {
                font-size: 1.25rem;
            }

            .languages-grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            }

            .levels-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            }

            .topics-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="nav-logo">Noc&#232;ne</a>
        <div class="credit-badge-count">0 Credits</div>
    </nav>

    <main>
        <h1>Language Learning Sets</h1>
        <p class="subtitle">Create customized flashcard and vocabulary sets for any language</p>

        <!-- Language Selection -->
        <div class="selection-section">
            <h2 class="section-title">Select Language</h2>
            <div class="card-grid languages-grid" id="languagesGrid"></div>
        </div>

        <!-- Level Selection -->
        <div class="selection-section">
            <h2 class="section-title">Select Proficiency Level</h2>
            <div class="card-grid levels-grid" id="levelsGrid"></div>
        </div>

        <!-- Topic Selection -->
        <div class="selection-section">
            <h2 class="section-title">Select Topic</h2>
            <div class="card-grid topics-grid" id="topicsGrid"></div>
        </div>

        <!-- Generate Button -->
        <div class="generate-section">
            <button class="generate-btn" id="generateBtn" onclick="generateSets()">Generate Learning Set (1 Credit)</button>
        </div>

        <!-- Loading State -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Creating your learning set...</p>
        </div>

        <!-- Output Section -->
        <div class="output-section" id="outputSection">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('flashcards')">Flashcards</button>
                <button class="tab-btn" onclick="switchTab('vocab')">Vocabulary List</button>
            </div>

            <!-- Flashcards Tab -->
            <div class="tab-content active" id="flashcardsTab">
                <div class="flashcard-set" id="flashcardSet"></div>
            </div>

            <!-- Vocabulary Tab -->
            <div class="tab-content" id="vocabTab">
                <div class="vocab-list" id="vocabList"></div>
            </div>
        </div>
    </main>

    <script src="credits.js"></script>
    <script src="https://app.lemonsqueezy.com/js/lemon.js" defer></script>

    <script>
        const languages = ['Spanish', 'French', 'German', 'Italian', 'Portuguese', 'Russian', 'Japanese', 'Mandarin'];
        const levels = ['Beginner', 'Intermediate', 'Advanced', 'Fluent'];
        const topics = ['Travel', 'Business', 'Food', 'Daily Life', 'Culture', 'Sports', 'Technology', 'Health'];

        let selectedLanguage = '';
        let selectedLevel = '';
        let selectedTopic = '';

        function initializeGrids() {
            renderGrid('languagesGrid', languages, 'language');
            renderGrid('levelsGrid', levels, 'level');
            renderGrid('topicsGrid', topics, 'topic');
        }

        function renderGrid(gridId, items, type) {
            const grid = document.getElementById(gridId);
            grid.innerHTML = '';
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.textContent = item;
                card.onclick = () => selectCard(card, item, type);
                grid.appendChild(card);
            });
        }

        function selectCard(element, value, type) {
            document.querySelectorAll(`#${type === 'language' ? 'languagesGrid' : type === 'level' ? 'levelsGrid' : 'topicsGrid'} .card`).forEach(card => {
                card.classList.remove('selected');
            });
            element.classList.add('selected');

            if (type === 'language') selectedLanguage = value;
            else if (type === 'level') selectedLevel = value;
            else if (type === 'topic') selectedTopic = value;

            updateGenerateButton();
        }

        function updateGenerateButton() {
            const btn = document.getElementById('generateBtn');
            btn.disabled = !(selectedLanguage && selectedLevel && selectedTopic);
        }

        async function generateSets() {
            if (!selectedLanguage || !selectedLevel || !selectedTopic) return;

            // Check credits
            if (typeof Nocene !== 'undefined' && Nocene.requireCredit) {
                if (!Nocene.requireCredit()) {
                    alert('You don\'t have enough credits.');
                    return;
                }
            }

            const loading = document.getElementById('loading');
            const outputSection = document.getElementById('outputSection');
            loading.classList.add('active');
            outputSection.classList.remove('active');

            try {
                const systemPrompt = `Create a language learning set with flashcards and vocabulary for ${selectedLanguage} at ${selectedLevel} level on the topic of ${selectedTopic}. Respond ONLY with valid JSON, no additional text:
{
  "flashcards": [{"word": "...", "translation": "...", "example": "..."}, ...],
  "vocabulary": [{"word": "...", "translation": "...", "partOfSpeech": "..."}, ...]
}`;

                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'content-type': 'application/json' },
                    body: JSON.stringify({
                        model: 'claude-sonnet-4-20250514',
                        max_tokens: 2000,
                        system: systemPrompt,
                        messages: [{ role: 'user', content: 'Generate the language learning set' }]
                    })
                });

                if (!response.ok) throw new Error('API error');
                const data = await response.json();
                const content = data.content || data.text || '';
                const jsonMatch = content.match(/\{[\s\S]*\}/);
                if (!jsonMatch) throw new Error('Invalid format');

                const sets = JSON.parse(jsonMatch[0]);
                displaySets(sets);
                loading.classList.remove('active');
                outputSection.classList.add('active');
            } catch (error) {
                loading.classList.remove('active');
                alert('Error: ' + error.message);
            }
        }

        function displaySets(sets) {
            // Display flashcards
            const flashcardSet = document.getElementById('flashcardSet');
            flashcardSet.innerHTML = '';
            sets.flashcards.forEach((card, index) => {
                const flashcard = document.createElement('div');
                flashcard.className = 'flashcard';
                flashcard.innerHTML = `<div class="flashcard-word">${card.word}</div><div class="flashcard-translation">${card.translation}</div><div style="font-size: 0.9rem; margin-top: 0.5rem; opacity: 0.6;"><em>${card.example || ''}</em></div>`;
                flashcard.onclick = () => flashcard.classList.toggle('flipped');
                flashcardSet.appendChild(flashcard);
            });

            // Display vocabulary
            const vocabList = document.getElementById('vocabList');
            vocabList.innerHTML = '';
            sets.vocabulary.forEach(item => {
                const vocabItem = document.createElement('div');
                vocabItem.className = 'vocab-item';
                vocabItem.innerHTML = `<div><div class="vocab-word">${item.word}</div><div class="vocab-translation">${item.translation}</div></div><div style="font-size: 0.85rem; color: #5a5a62;">${item.partOfSpeech || ''}</div>`;
                vocabList.appendChild(vocabItem);
            });
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabName + 'Tab').classList.add('active');
            event.target.classList.add('active');
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', () => {
            initializeGrids();
            updateGenerateButton();

            if (typeof Nocene !== 'undefined' && Nocene.onCreditChange) {
                Nocene.onCreditChange(() => {
                    updateCreditBadge();
                });
            }
        });

        function updateCreditBadge() {
            const badge = document.querySelector('.credit-badge-count');
            if (typeof Nocene !== 'undefined' && Nocene.getCredits) {
                const credits = Nocene.getCredits();
                badge.textContent = credits + ' Credits';
            }
        }

        // Auto-update credits
        if (typeof Nocene !== 'undefined' && Nocene.onCreditChange) {
            Nocene.onCreditChange(() => {
                updateCreditBadge();
            });
        }
    </script>
</body>
</html>
